<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div class="container">
        <div class="upper">
            <div class="expression" id="expressionDisplay"></div>
            <div class="current-input" id="currentDisplay">0</div>
          </div>
          <hr>
          <br>
        <div class="lower">
            <button class="btn p" type="button" value="" id="clear">AC</button>
            <button class="btn p" type="button" value="" id="erase">CE</button>
            <button class="btn p" type="button" value="%">&percnt;</button>
            <button class="btn p" type="button" value="/">&divide;</button>
            <button class="btn" type="button" value="7">7</button>
            <button class="btn" type="button" value="8">8</button>
            <button class="btn" type="button" value="9">9</button>
            <button class="btn p" type="button" value="*">&times;</button>
            <button class="btn" type="button" value="4">4</button>
            <button class="btn" type="button" value="5">5</button>
            <button class="btn" type="button" value="6">6</button>
            <button class="btn p" type="button" value="-">&minus;</button>
            <button class="btn" type="button" value="1">1</button>
            <button class="btn" type="button" value="2">2</button>
            <button class="btn" type="button" value="3">3</button>
            <button class="btn p" type="button" value="+">&plus;</button>
            <button class="btn" id="zero_big" type="button" value="0">0</button>
            <button class="btn" type="button" value=".">&period;</button>
            <button class="btn p" type="button" value="=" id="equal">&equals;</button>
        </div>
    </div>
        <script src="calculator.js"></script>
</body>
</html>
